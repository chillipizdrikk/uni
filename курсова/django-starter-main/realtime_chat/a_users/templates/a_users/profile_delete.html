{% extends 'layouts/box.html' %}

{% block content %}

<h1>Видалення акаунту</h1>
<p>Ви впевнені, що хочете видалити акаунт?</p>

<form method='POST'>
    {% csrf_token %}
    <button type="submit" class="button-red mt-6">Так, я хочу видалити акаунт</button>
    <a class="button button-gray ml-1" href="{{ request.META.HTTP_REFERER }}">Скасувати</a>
</form>

{% endblock %}
